<svg xmlns="http://www.w3.org/2000/svg" width="995" height="554" viewBox="0 0 995 554" font-family="Helvetica,Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#1a1a1a"/>
    </marker>
    <marker id="arrc" markerWidth="10" markerHeight="10" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7a2d2d"/>
    </marker>
  </defs>
  <style>
    .wire{stroke:#1a1a1a;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .dev{stroke:#1a1a1a;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .rail{stroke:#1a1a1a;stroke-width:2.4;fill:none}
    .ic{fill:#fffbdd;stroke:#1a1a1a;stroke-width:2}
    .port{fill:#fbf3e6;stroke:#9a6a1a;stroke-width:1.3}
    .dot{fill:#1a1a1a}
    .lbl{font-size:12.5px;fill:#111}
    .val{font-size:11px;fill:#555}
    .pin{font-size:10px;fill:#1a1a1a}
    .pol{font-size:12px;fill:#111}
    .sm{font-size:10.5px;fill:#555}
    .ic-ttl{font-size:13px;font-weight:bold;fill:#111}
    .port-lbl{font-size:11.5px;fill:#7a2d2d;font-weight:bold}
    .rail-lbl{font-size:11px;fill:#1a5e1a;font-weight:bold}
    .ttl{font-size:15px;font-weight:bold;fill:#111}
    .note{font-size:10.5px;fill:#555}
    .act{fill:#fff;stroke:#1a1a1a;stroke-width:1.5}
    .blk{fill:#eef3fb;stroke:#33507a;stroke-width:1.5}
    .blk-ttl{font-size:13px;font-weight:bold;fill:#1b2c4a}
    .flow{stroke:#1a1a1a;stroke-width:1.8;fill:none;marker-end:url(#arr)}
    .flowc{stroke:#7a2d2d;stroke-width:1.8;fill:none;stroke-dasharray:6 4;marker-end:url(#arrc)}
    .flbl{font-size:11px;fill:#1a5e1a;font-weight:bold}
  </style>
  <rect x="0" y="0" width="995" height="554" fill="#fff"/>
  <text x="20" y="26" class="ttl">Milestone-1 self-read PoC — system overview</text>
  <g transform="translate(5,28)">
  <path d="M225,95 L245,95 L245,100 L400,100" class="flow"/>
  <text x="310" y="94" class="flbl" text-anchor="middle">USB / BAT</text>
  <path d="M130,128 L130,249" class="flow"/>
  <text x="130" y="182.5" class="flbl" text-anchor="middle">3.3 V</text>
  <path d="M450,148 L450,280 L215,280" class="flow"/>
  <text x="398.5" y="274" class="flbl" text-anchor="middle">DRIVE (GPIO2)</text>
  <path d="M130,311 L130,370" class="flow"/>
  <text x="130" y="334.5" class="flbl" text-anchor="middle">~2 Vpp</text>
  <path d="M215,400 L280,400" class="flow"/>
  <text x="247.5" y="382" class="flbl" text-anchor="middle">plate</text>
  <text x="247.5" y="394" class="flbl" text-anchor="middle">coupling</text>
  <path d="M460,400 L510,400" class="flow"/>
  <text x="485" y="394" class="flbl" text-anchor="middle">ringdown (mV)</text>
  <path d="M710,400 L760,400" class="flow"/>
  <text x="735" y="394" class="flbl" text-anchor="middle">held peak (V)</text>
  <path d="M850,370 L850,300 L550,300 L550,148" class="flow"/>
  <text x="659" y="294" class="flbl" text-anchor="middle">I²C (SDA/SCL)</text>
  <path d="M600,100 L620,100 L620,95 L770,95" class="flowc"/>
  <text x="682.5" y="89" class="flbl" text-anchor="middle">WiFi</text>
  <path d="M500,148 L500,348 L610,348 L610,368" class="flow"/>
  <text x="500" y="307" class="flbl" text-anchor="middle">RESET</text>
<g transform="translate(130,95)">
<rect x="-95" y="-33" width="190" height="66" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Power</text>
<text x="0" y="13" class="sm" text-anchor="middle">USB-C / 1S LiPo (BAT pads)</text>
<text x="0" y="27" class="sm" text-anchor="middle">→ one 3.3 V rail</text>
</g>

<g transform="translate(500,100)">
<rect x="-100" y="-48" width="200" height="96" rx="9" class="blk"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Xiao ESP32-C6</text>
<text x="0" y="13" class="sm" text-anchor="middle">LEDC drive · RESET</text>
<text x="0" y="27" class="sm" text-anchor="middle">I²C master · WiFi</text>
</g>

<g transform="translate(860,95)">
<rect x="-90" y="-33" width="180" height="66" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Home Assistant</text>
<text x="0" y="13" class="sm" text-anchor="middle">timestamped log</text>
<text x="0" y="27" class="sm" text-anchor="middle">= evidence bundle</text>
</g>

<g transform="translate(130,280)">
<rect x="-85" y="-31" width="170" height="62" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Drive buffer</text>
<text x="0" y="13" class="sm" text-anchor="middle">S8050 / S8550</text>
</g>

<g transform="translate(130,400)">
<rect x="-85" y="-30" width="170" height="60" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Ring 0 (TX)</text>
<text x="0" y="13" class="sm" text-anchor="middle">piezo</text>
</g>

<g transform="translate(370,400)">
<rect x="-90" y="-30" width="180" height="60" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Rings on jig (RX)</text>
<text x="0" y="13" class="sm" text-anchor="middle">shared-plate coupling</text>
</g>

<g transform="translate(610,400)">
<rect x="-100" y="-32" width="200" height="64" rx="9" class="act"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">Amps ×120 + detectors ×3</text>
<text x="0" y="13" class="sm" text-anchor="middle">MCP6022 · 1N5819 / hold</text>
</g>

<g transform="translate(850,400)">
<rect x="-90" y="-30" width="180" height="60" rx="9" class="blk"/>
<text x="0" y="-4" class="blk-ttl" text-anchor="middle">ADS1015</text>
<text x="0" y="13" class="sm" text-anchor="middle">I²C · 4-ch mux · PGA</text>
</g>

  </g>
  <rect x="16" y="500" width="963" height="40" rx="6" fill="#fbfbf2" stroke="#ddd"/>
  <text x="26" y="514" class="note">Loop: drive → self-read → record → (predict). The reproducible coupling matrix logged in HA, standing above the shuffled AND off-resonance controls, is the Milestone-1</text>
  <text x="26" y="528" class="note">receipt. Rev 2: single 3.3 V rail; coupled signals are mV-level, so every detector gets a ×120 amp in front (see peak_detector.svg).</text>
</svg>
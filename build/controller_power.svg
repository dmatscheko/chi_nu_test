  </g>
  <rect x="16" y="580" width="1171" height="124" rx="6" fill="#fbfbf2" stroke="#ddd"/>
  <text x="26" y="594" class="note">Power, bench: USB-C → Xiao onboard regulator = 3.3 V for EVERYTHING (ESP, ADS1015, amps, CD4066, drive buffer). Untethered: 1S LiPo soldered to the XIAO BAT pads (onboard charger charges it over USB); same</text>
  <text x="26" y="608" class="note">3.3 V rail. One source at a time is not an issue — the charger arbitrates.</text>
  <text x="26" y="622" class="note">The drive buffer, CD4066 (VDD = 3.3 V) and the x120 RX amps all run from this 3.3 V rail — see drive_stage.svg / tx_select.svg / peak_detector.svg. An OPTIONAL +5 V bench rail (USB or 7805 from a bench</text>
  <text x="26" y="636" class="note">supply) is only needed for the LM358-fallback amps or an LM386 drive experiment; nothing in the baseline uses it.</text>
  <text x="26" y="650" class="note">I²C: SDA = GPIO22 (D4), SCL = GPIO23 (D5), 400 kHz; 4.7 kΩ pull-ups to 3.3 V (the GY-ADS1015 module usually carries its own — add external only if the bus does not ACK). ADDR → GND ⇒ address 0x48.</text>
  <text x="26" y="664" class="note">Xiao C6 pin budget: GPIO2 = DRIVE (LEDC), GPIO0/GPIO1/GPIO18 = TX selects, GPIO21 = detector RESET, GPIO22/23 = I²C. Free for sensors later: GPIO16/17 (UART), GPIO19/20. GPIO3/4/5/6/7 do not exist on the</text>
  <text x="26" y="678" class="note">headers (C3-only pin map — do not copy configs across).</text>
  <text x="26" y="692" class="note">Single star ground; keep the drive-stage return off the detector grounds; route I²C and the ring/amp analog area away from the WiFi antenna end.</text>
</svg>
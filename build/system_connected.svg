  </g>
  <rect x="16" y="900" width="1866" height="110" rx="6" fill="#fbfbf2" stroke="#ddd"/>
  <text x="26" y="914" class="note">Read it left → right. POWER: USB-C on the bench, or a 1S LiPo soldered to the XIAO's BAT pads when untethered (the Xiao charges it over USB and its onboard regulator makes +3.3 V). That ONE dark-red 3.3 V rail feeds the brain, the drive buffer, the CD4066, the six amp op-amps and the ADS1015. All blocks share one common ground</text>
  <text x="26" y="928" class="note">(blue).</text>
  <text x="26" y="942" class="note">SIGNAL (solid arrows): the Xiao makes a square-wave burst → the push-pull buffer makes ~1.9 Vpp → the CD4066 routes it to ONE chosen ring → that ring rings the others through the shared plate (only millivolts arrive) → each ring's signal is amplified ×120, envelope-detected (1N5819 + 10 nF hold) → the held value is read by the</text>
  <text x="26" y="956" class="note">ADS1015.</text>
  <text x="26" y="970" class="note">CONTROL (dashed): the Xiao picks the ring (GPIO0/1/18), fires the burst (GPIO2, 50% duty LEDC), RESETS the detectors right AFTER each burst (GPIO21) so only true post-drive ringdown is held, then reads the three results over I²C (GPIO22/23) and logs them to Home Assistant over WiFi. The reproducible 3×3 table, above the</text>
  <text x="26" y="984" class="note">shuffled AND off-resonance controls, is the Milestone-1 receipt.</text>
  <text x="26" y="998" class="note">Each ring is BOTH a sender and a listener: the CD4066 drives the chosen one while the other two stay high-impedance and just listen — that is the "self-read". The driven ring's own channel saturates its amp during the burst, so its diagonal C_ii is captured on a second burst a few ms later (ringdown tail).</text>
</svg>
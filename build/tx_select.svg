  </g>
  <rect x="16" y="661" width="1019" height="152" rx="6" fill="#fbfbf2" stroke="#ddd"/>
  <text x="26" y="675" class="note">Exactly one of GPIO0/GPIO1/GPIO18 high at a time (firmware enforces this) closes one switch; the driven ring gets the burst, the other two stay high-Z so their RX amp+detector</text>
  <text x="26" y="689" class="note">chains read clean coupled ringdown. This replaces the hardwired single-ring TX of drive_stage.svg for the full 3x3 sweep.</text>
  <text x="26" y="703" class="note">CD4066 VDD = +3.3 V, VSS = GND. This is deliberate: at VDD = 5 V the CD4066B worst-case control threshold is V_IH = 3.5 V, so a 3.3 V GPIO is OUT OF SPEC (it usually works at</text>
  <text x="26" y="717" class="note">room temperature — and fails in the field). At VDD = 3.3 V the GPIO swings the full rail and the 0.7–2.6 V drive swing still fits. Cost: R_on rises to ~0.5–2 kΩ, in series with</text>
  <text x="26" y="731" class="note">R_drive into the ~1.6 kΩ ring — the absolute drive amplitude drops, all channels equally; the relative matrix and the x120 RX gain absorb it. Want low R_on at 3.3 V? Order a</text>
  <text x="26" y="745" class="note">74HC4066 (~50 Ω) — drop-in.</text>
  <text x="26" y="759" class="note">After each burst the firmware opens ALL switches before the capture window, so even the driven ring rings down high-Z (its ringdown swings ±1.5 V; the open switch's input clamp</text>
  <text x="26" y="773" class="note">only nibbles below −0.5 V, gone by the time the diagonal tail is read).</text>
  <text x="26" y="787" class="note">Alternative: a CD4051 8:1 mux (3 binary address lines A/B/C + INH) also works, but that needs firmware to drive a 2-bit address, not three independent enables — so the CD4066</text>
  <text x="26" y="801" class="note">matches chi_nu_poc.yaml as written.</text>
</svg>
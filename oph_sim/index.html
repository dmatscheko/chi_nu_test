<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPH — Observer-Patch Holography · the proof chain, simulated (v2)</title>
<style>
  :root{
    --bg:#070b18; --panel:#0e1530f2; --panel-br:#26305c;
    --ink:#dfe6ff; --dim:#8d97c5; --gold:#ffc84d; --green:#39e08b;
    --red:#ff5b74; --violet:#b37bff; --cyan:#4cc9f0; --mag:#ff4dd2;
    --sidebar-w:178px; --panel-w:344px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:"Avenir Next","Segoe UI",system-ui,sans-serif;color:var(--ink);}
  /* ---------- chrome ---------- */
  #sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);z-index:20;
    background:#0a102399;border-right:1px solid var(--panel-br);padding:12px 10px;
    overflow-y:auto;backdrop-filter:blur(8px);}
  #sidebar h1{font-size:12px;font-weight:700;letter-spacing:.06em;margin:2px 2px 10px;line-height:1.4;}
  #sidebar h1 span{color:var(--dim);font-weight:500;font-size:10px;display:block;}
  .navgroup{margin:12px 0 4px;font-size:9.5px;text-transform:uppercase;letter-spacing:.16em;color:var(--dim);padding-left:6px;}
  .navitem{display:block;padding:5px 8px;margin:2px 0;border-radius:8px;font-size:12px;color:var(--dim);
    cursor:pointer;user-select:none;border:1px solid transparent;line-height:1.3;}
  .navitem:hover{color:var(--ink);background:#141d42;}
  .navitem.active{color:#0b0f22;background:var(--gold);font-weight:600;}
  .navitem .tag{font-size:9px;color:inherit;opacity:.7;margin-left:4px;}
  #stage{position:absolute;top:0;left:var(--sidebar-w);right:0;bottom:0;overflow:hidden;}
  #stage.withpanel{right:calc(var(--panel-w) + 16px);}
  .stagepage{position:absolute;inset:0;overflow:auto;padding:18px 22px;display:none;background:var(--bg);}
  .stagepage.active{display:block;}
  .stage3d{position:absolute;inset:0;display:none;}
  .stage3d.active{display:block;}
  #panelwrap{position:fixed;top:12px;right:12px;width:var(--panel-w);max-height:calc(100% - 24px);z-index:15;
    overflow-y:auto;background:var(--panel);border:1px solid var(--panel-br);border-radius:14px;
    padding:14px 14px 16px;backdrop-filter:blur(8px);font-size:12.5px;}
  #panelwrap::-webkit-scrollbar{width:8px;} #panelwrap::-webkit-scrollbar-thumb{background:#2a3564;border-radius:4px;}
  #panelwrap.hidden{display:none;}
  .scenepanel{display:none;} .scenepanel.active{display:block;}
  #banner{position:fixed;top:14px;left:calc(var(--sidebar-w) + 20px);right:calc(var(--panel-w) + 40px);z-index:18;
    max-width:640px;margin:0 auto;text-align:center;padding:9px 16px;border-radius:12px;
    border:1px solid var(--panel-br);background:var(--panel);font-size:13px;line-height:1.5;
    display:none;backdrop-filter:blur(8px);}
  #banner.show{display:block;}
  #banner.ok{border-color:#1f7a4d;} #banner.bad{border-color:#8a2f42;} #banner.ghost{border-color:var(--mag);}
  #banner.warn{border-color:#8a6d2f;}
  #legend{position:fixed;bottom:12px;left:calc(var(--sidebar-w) + 14px);z-index:15;
    background:var(--panel);border:1px solid var(--panel-br);border-radius:12px;
    padding:9px 12px;font-size:11px;color:var(--dim);line-height:1.7;backdrop-filter:blur(8px);display:none;max-width:44vw;}
  #legend.show{display:block;}
  /* ---------- shared widgets (used by all scenes) ---------- */
  .sec{margin-bottom:12px;}
  .sec h2{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--dim);margin-bottom:7px;}
  .rowc{display:flex;align-items:center;gap:8px;margin:5px 0;}
  .rowc label{flex:0 0 92px;color:var(--dim);font-size:12px;}
  .rowc output{flex:0 0 40px;text-align:right;color:var(--gold);font-variant-numeric:tabular-nums;font-size:12px;}
  input[type=range]{flex:1;accent-color:var(--gold);height:20px;}
  select{background:#141d42;color:var(--ink);border:1px solid var(--panel-br);border-radius:7px;padding:4px;font-size:12px;}
  .btn{display:inline-block;padding:6px 11px;margin:3px 4px 3px 0;border-radius:9px;cursor:pointer;
    border:1px solid var(--panel-br);background:#141d42;color:var(--ink);font-size:12px;user-select:none;}
  .btn:hover{border-color:var(--gold);color:var(--gold);}
  .btn.primary{background:var(--gold);border-color:var(--gold);color:#0b0f22;font-weight:600;}
  .btn.primary:hover{filter:brightness(1.1);color:#0b0f22;}
  .btn.ghostbtn{border-color:#7a3f9c;} .btn.ghostbtn:hover{border-color:var(--mag);color:var(--mag);}
  .btn.small{padding:4px 8px;font-size:11px;}
  .btn.toggled{background:#2a3564;border-color:var(--cyan);color:var(--cyan);}
  .btn.disabled{opacity:.35;pointer-events:none;}
  .badge{border-radius:9px;padding:7px 9px;margin:6px 0;font-size:12px;line-height:1.45;
    border:1px solid var(--panel-br);background:#111938;}
  .badge b{font-weight:600;}
  .badge.ok{border-color:#1f7a4d;background:#0d2b1e;color:#a8f5cd;}
  .badge.bad{border-color:#8a2f42;background:#2b0d16;color:#ffc3ce;}
  .badge.warn{border-color:#8a6d2f;background:#2b230d;color:#ffe6a8;}
  .badge.info{color:var(--ink);}
  .badge.open{border-color:#7a3f9c;background:#1d1030;color:#e6c8ff;}
  .mono{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:11px;}
  .kv{color:var(--dim);} .kv b{color:var(--ink);font-weight:600;}
  .leanref{color:#6f7bb0;font-family:"SF Mono",Menlo,monospace;font-size:10px;}
  .hint{color:var(--dim);font-size:11px;line-height:1.5;margin-top:8px;}
  .swatch{display:inline-block;width:10px;height:10px;border-radius:3px;margin:0 4px 0 0;vertical-align:-1px;}
  hr.thin{border:none;border-top:1px solid var(--panel-br);margin:10px 0;}
  /* ---------- stage page content ---------- */
  .pagetitle{font-size:16px;font-weight:600;margin-bottom:2px;}
  .pagesub{font-size:12px;color:var(--dim);margin-bottom:14px;line-height:1.5;max-width:900px;}
  .card{background:var(--panel);border:1px solid var(--panel-br);border-radius:14px;padding:14px 16px;margin:0 0 14px;}
  .card h3{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);margin-bottom:8px;}
  .cardrow{display:flex;gap:14px;flex-wrap:wrap;}
  .cardrow .card{flex:1 1 380px;min-width:340px;}
  canvas.block{display:block;width:100%;background:#0a102a;border:1px solid var(--panel-br);border-radius:10px;}
  table.data{border-collapse:collapse;width:100%;font-size:12px;margin:6px 0;}
  table.data td,table.data th{border:1px solid var(--panel-br);padding:4px 8px;text-align:left;}
  table.data th{color:var(--dim);background:#111938;font-weight:600;}
  table.data td.num{text-align:right;font-variant-numeric:tabular-nums;}
  .good{color:var(--green);} .badc{color:var(--red);} .dimc{color:var(--dim);} .goldc{color:var(--gold);}
  .violetc{color:var(--violet);} .cyanc{color:var(--cyan);} .magc{color:var(--mag);}
  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;z-index:5;}
</style>
</head>
<body>
<div id="sidebar">
  <h1>OBSERVER-PATCH HOLOGRAPHY<span>the proof chain, simulated · v2 (corpus v9)</span></h1>
  <div id="nav"></div>
</div>
<div id="stage"></div>
<div id="panelwrap" class="hidden"></div>
<div id="banner"></div>
<div id="legend"></div>
<div id="boot">loading…</div>
<script>
/* Classic (non-module) script: runs even where the ES-module app cannot.
   Loading from file:// blocks module imports (CORS), so show the server
   one-liner instead of a dead "loading…". */
(function () {
  function showServerNotice(reason) {
    var b = document.getElementById('boot');
    if (!b) return;
    b.innerHTML =
      '<div style="max-width:620px;padding:26px 30px;background:var(--panel);border:1px solid var(--panel-br);border-radius:14px;line-height:1.6;">' +
      '<div style="font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;">This showroom needs a tiny web server</div>' +
      '<div style="font-size:12.5px;color:var(--dim);">' + reason +
      ' Start one from the repo root (<span style="font-family:Menlo,monospace">chi_nu_test/</span>):</div>' +
      '<pre style="margin:12px 0;padding:10px 12px;background:#0a102a;border:1px solid var(--panel-br);border-radius:9px;color:var(--gold);font-size:12.5px;overflow-x:auto;">python3 -m http.server 8123 --directory oph_sim</pre>' +
      '<div style="font-size:12.5px;color:var(--dim);">…or from anywhere: <span style="font-family:Menlo,monospace;color:var(--ink)">python3 -m http.server 8123 --directory chi_nu_test/oph_sim</span></div>' +
      '<div style="font-size:13px;margin-top:10px;">then open <a href="http://localhost:8123" style="color:var(--cyan);">http://localhost:8123</a></div>' +
      '<div style="font-size:11px;color:var(--dim);margin-top:12px;">(Any static server works — the page is plain files; ES modules just refuse to load over file://. Headless, no browser at all: <span style="font-family:Menlo,monospace">node node/selftest.mjs</span> · <span style="font-family:Menlo,monospace">node node/experiments.mjs quick</span>)</div>' +
      '</div>';
    b.style.display = 'flex';
  }
  window.__showServerNotice = showServerNotice;   // used by the module app as a late-failure fallback too
  if (location.protocol === 'file:') {
    showServerNotice('You opened <span style="font-family:Menlo,monospace">index.html</span> straight from the file system, and browsers refuse to load ES modules over <span style="font-family:Menlo,monospace">file://</span>.');
  }
})();
</script>
<script type="module" src="./js/app.js"
  onerror="window.__showServerNotice && window.__showServerNotice('The app modules failed to load (<span style=&quot;font-family:Menlo,monospace&quot;>js/app.js</span> unreachable) — the server may have stopped, or this is a partial copy.')"></script>
</body>
</html>
